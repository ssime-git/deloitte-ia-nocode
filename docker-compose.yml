services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [training_net]
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  n8n:
    build: ./n8n
    restart: unless-stopped
    networks: [training_net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/home/node/.n8n-files/data:rw
      - ./corpus:/home/node/.n8n-files/corpus:ro
      - ./n8n/workflows:/workflows:ro
      - ./data:/data:ro
      - ./corpus:/corpus:ro
      - ./project:/project:ro
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: ${TIMEZONE:-Europe/Paris}
      N8N_PUBLIC_API_ENABLED: "true"
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      OPENAI_GATEWAY_API_KEY: ${OPENAI_GATEWAY_API_KEY:-}
      OPENAI_GATEWAY_BASE_URL: ${OPENAI_GATEWAY_BASE_URL:-https://ai-gateway.liora.tech/v1}
      OPENAI_GATEWAY_MODEL: ${OPENAI_GATEWAY_MODEL:-gpt-4.1-nano}
      MCP_SSE_ENDPOINT: ${MCP_SSE_ENDPOINT:-http://mcp-server:8000/sse}
      N8N_CUSTOM_ENV_VARS: MCP_SSE_ENDPOINT
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"

  n8n-bootstrap:
    build: ./n8n
    restart: "no"
    networks: [training_net]
    depends_on:
      - n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["sh", "-lc"]
    command: ["node /bootstrap-scripts/preload-n8n.mjs"]
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./n8n/bootstrap:/bootstrap:ro
      - ./scripts:/bootstrap-scripts:ro
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_BASE_URL: http://n8n:5678
      N8N_PRELOAD_WORKFLOWS_DIR: /workflows
      N8N_PRELOAD_CREDENTIALS_FILE: /bootstrap/credentials.json
      N8N_PRELOAD_STATE_FILE: /home/node/.n8n/.preload-state.json
      OPENAI_GATEWAY_API_KEY: ${OPENAI_GATEWAY_API_KEY:-}
      OPENAI_GATEWAY_BASE_URL: ${OPENAI_GATEWAY_BASE_URL:-https://ai-gateway.liora.tech/v1}
      OPENAI_GATEWAY_MODEL: ${OPENAI_GATEWAY_MODEL:-gpt-4.1-nano}
      MCP_SSE_ENDPOINT: ${MCP_SSE_ENDPOINT:-http://mcp-server:8000/sse}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GENERIC_TIMEZONE: ${TIMEZONE:-Europe/Paris}

  qdrant:
    image: qdrant/qdrant:v1.15.1
    restart: unless-stopped
    profiles: [rag]
    networks: [training_net]
    volumes:
      - qdrant_data:/qdrant/storage

  mcp-server:
    build: ./mcp-server
    restart: unless-stopped
    profiles: [mcp]
    networks: [training_net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${MCP_SERVER_PORT:-8001}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data:ro
      - ./corpus:/corpus:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATA_DIR: /data
      CORPUS_DIR: /corpus
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: "8000"
      OPENAI_BASE_URL: ${OPENAI_GATEWAY_BASE_URL:-https://ai-gateway.liora.tech/v1}
      OPENAI_API_KEY: ${OPENAI_GATEWAY_API_KEY:-}

volumes:
  pgdata:
  n8n_data:
  qdrant_data:

networks:
  training_net:
    driver: bridge
